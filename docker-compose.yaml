# Local dev/run for the two AIFAS images (backend API + static SPA frontend).
#
#   docker compose up --build
#
# Open http://localhost:8080  -> nginx serves the SPA and proxies /api + /config
#                                to the backend (http://app:8080) over the compose network.
# The backend is also exposed directly on http://localhost:3001 for debugging.
#
# Override any value via a .env file or the shell, e.g.:
#   FRONTEND_OIDC_AUTHORITY=https://dev.loginproxy.gov.bc.ca/auth/realms/standard docker compose up
services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: aifas-app:local
    # host:container — backend reachable directly at http://localhost:8080 (matches `npm run serve`)
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      SERVER_APIPATH: "/api/v1"
      SERVER_BODYLIMIT: "30mb"
      SERVER_LOGLEVEL: "http"
      FRONTEND_APIPATH: "api/v1"
      # OIDC authority the browser logs in against (BC Gov Keycloak, DEV realm).
      # The client `ai-form-assistant-showcase-6180` must have http://localhost:8080/*
      # registered as a Valid redirect URI and http://localhost:8080 as a Web Origin.
      FRONTEND_OIDC_AUTHORITY: "${FRONTEND_OIDC_AUTHORITY:-https://dev.loginproxy.gov.bc.ca/auth/realms/standard}"
      FRONTEND_OIDC_CLIENTID: "${FRONTEND_OIDC_CLIENTID:-ai-form-assistant-showcase-6180}"
      # Backend OIDC token verification (matches the DEV realm above).
      SERVER_OIDC_AUTHORITY: "${SERVER_OIDC_AUTHORITY:-https://dev.loginproxy.gov.bc.ca/auth/realms/standard}"
      SERVER_OIDC_SERVERURL: "${SERVER_OIDC_SERVERURL:-https://dev.loginproxy.gov.bc.ca/auth}"
      SERVER_OIDC_REALM: "${SERVER_OIDC_REALM:-standard}"
      SERVER_OIDC_IDENTITYKEY: "${SERVER_OIDC_IDENTITYKEY:-idir_user_guid,bceid_user_guid,github_id}"
      SERVER_OIDC_PUBLICKEY: "${SERVER_OIDC_PUBLICKEY:-}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aifas-frontend:local
    # host:container — SPA reachable at http://localhost:5173 (matches the Vite dev port).
    # nginx still listens on 8080 inside the container; only the host port differs.
    ports:
      - "5173:8080"
    environment:
      # nginx proxies /api and /config here (compose service name on the shared network).
      BACKEND_ORIGIN: "http://app:8080"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
