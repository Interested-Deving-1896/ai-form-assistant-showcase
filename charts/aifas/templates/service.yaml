---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aifas.fullname" . }}
  labels:
    {{- include "aifas.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: {{ .Values.service.portName }}
      port: {{ .Values.service.port }}
      protocol: TCP
      targetPort: {{ .Values.service.port }}
  selector:
    {{- include "aifas.selectorLabels" . | nindent 4 }}
