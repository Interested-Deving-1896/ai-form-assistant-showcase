---
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: aifas-app-build
  annotations:
    description: |
      Build (Docker strategy) and ImageStream for the AIFAS backend (Express/Node API).
      Builds from the `app/` context directory and pushes to the
      `aifas-app:latest` ImageStream tag in the tools namespace. Environment
      tags (dev/test/prod) are produced by promoting `latest` with `oc tag`
      (see openshift/README.md).
    tags: aifas,backend,nodejs,express
labels:
  app: aifas
  component: app
parameters:
  - name: REPO_OWNER
    description: GitHub organization / owner
    value: bcgov
    required: true
  - name: REPO_NAME
    description: GitHub repository name
    value: ai-form-assistant-showcase
    required: true
  - name: SOURCE_GIT_URL
    description: Git URL to build from
    value: https://github.com/bcgov/ai-form-assistant-showcase.git
    required: true
  - name: SOURCE_GIT_REF
    description: Git branch, tag, or commit to build
    value: main
    required: true
  - name: OUTPUT_TAG
    description: ImageStream tag the build pushes to
    value: latest
    required: true
objects:
  # Image registry for the built backend image
  - apiVersion: image.openshift.io/v1
    kind: ImageStream
    metadata:
      name: aifas-app
      labels:
        app: aifas
        component: app
    spec:
      # Allow local (in-cluster) name resolution so Deployments can reference it directly
      lookupPolicy:
        local: true

  # Docker-strategy build that compiles the TypeScript API and produces the runtime image
  - apiVersion: build.openshift.io/v1
    kind: BuildConfig
    metadata:
      name: aifas-app
      labels:
        app: aifas
        component: app
    spec:
      completionDeadlineSeconds: 1800
      failedBuildsHistoryLimit: 3
      successfulBuildsHistoryLimit: 3
      output:
        to:
          kind: ImageStreamTag
          name: aifas-app:${OUTPUT_TAG}
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 2Gi
      source:
        type: Git
        git:
          uri: ${SOURCE_GIT_URL}
          ref: ${SOURCE_GIT_REF}
        contextDir: app
      strategy:
        type: Docker
        dockerStrategy:
          dockerfilePath: Dockerfile
      triggers:
        - type: ConfigChange
