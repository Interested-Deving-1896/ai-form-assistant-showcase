---
# AIFAS frontend (nginx SPA) — Deployment + Service + Route for the TEST namespace.
# Pulls 1dca6b-tools/aifas-frontend:test and proxies /api + /config to the backend
# Service (aifas-app) via BACKEND_ORIGIN. This Route is the single external entrypoint.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aifas-frontend
  labels:
    app: aifas
    component: frontend
    env: test
  annotations:
    image.openshift.io/triggers: |
      [{"from":{"kind":"ImageStreamTag","name":"aifas-frontend:test","namespace":"1dca6b-tools"},"fieldPath":"spec.template.spec.containers[?(@.name==\"frontend\")].image","pause":"false"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aifas
      component: frontend
  template:
    metadata:
      labels:
        app: aifas
        component: frontend
        env: test
    spec:
      containers:
        - name: frontend
          # Resolved/overwritten by the trigger annotation above; full path is the fallback.
          image: image-registry.openshift-image-registry.svc:5000/1dca6b-tools/aifas-frontend:test
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # nginx proxies /api and /config to the backend Service in this namespace.
            - name: BACKEND_ORIGIN
              value: "http://aifas-app:8080"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: aifas-frontend
  labels:
    app: aifas
    component: frontend
    env: test
spec:
  type: ClusterIP
  selector:
    app: aifas
    component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aifas-frontend
  labels:
    app: aifas
    component: frontend
    env: test
spec:
  # Omit host to let OpenShift generate one, or uncomment to pin the conventional host:
  # host: aifas-test.apps.silver.devops.gov.bc.ca
  to:
    kind: Service
    name: aifas-frontend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
