---
# AIFAS backend (Express API) — Deployment + Service for the TEST namespace.
# Pulls 1dca6b-tools/aifas-app:test. The image.openshift.io/triggers annotation
# makes the Deployment auto-roll when that tag is re-pushed/promoted.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aifas-app
  labels:
    app: aifas
    component: app
    env: test
  annotations:
    image.openshift.io/triggers: |
      [{"from":{"kind":"ImageStreamTag","name":"aifas-app:test","namespace":"1dca6b-tools"},"fieldPath":"spec.template.spec.containers[?(@.name==\"app\")].image","pause":"false"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aifas
      component: app
  template:
    metadata:
      labels:
        app: aifas
        component: app
        env: test
    spec:
      containers:
        - name: app
          # Resolved/overwritten by the trigger annotation above; full path is the fallback.
          image: image-registry.openshift-image-registry.svc:5000/1dca6b-tools/aifas-app:test
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aifas-config
          readinessProbe:
            httpGet:
              path: /api
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: aifas-app
  labels:
    app: aifas
    component: app
    env: test
spec:
  type: ClusterIP
  selector:
    app: aifas
    component: app
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
