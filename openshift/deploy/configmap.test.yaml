---
# Test-environment configuration for the AIFAS backend (served to the SPA via /config).
# Values mirror .github/environments/values.test.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aifas-config
  labels:
    app: aifas
    env: test
data:
  FRONTEND_APIPATH: "api/v1"
  FRONTEND_NOTIFICATION_BANNER: "This is the TEST environment of aifas."
  FRONTEND_OIDC_AUTHORITY: "https://test.loginproxy.gov.bc.ca/auth/realms/standard"
  FRONTEND_OIDC_CLIENTID: "ai-form-assistant-showcase-6180"
  SERVER_APIPATH: "/api/v1"
  SERVER_BODYLIMIT: "30mb"
  SERVER_LOGLEVEL: "http"
  SERVER_OIDC_AUTHORITY: "https://test.loginproxy.gov.bc.ca/auth/realms/standard"
  SERVER_OIDC_IDENTITYKEY: "idir_user_guid,bceid_user_guid,github_id"
  SERVER_OIDC_PUBLICKEY: ""
  # NOTE: source values.test.yaml has this as "https://dtestev.loginproxy.gov.bc.ca/auth"
  # which looks like a typo (issuer would not match the test.loginproxy token issuer
  # and break JWT verification). Corrected to test.loginproxy below — revert if intentional.
  SERVER_OIDC_SERVERURL: "https://test.loginproxy.gov.bc.ca/auth"
  SERVER_OIDC_REALM: "standard"
  SERVER_PORT: "8080"

  # --- Frontend (nginx) runtime config ---
  # ORCHESTRATOR_API_URL is injected into the embedded client.js via
  # /aifas-client-scripts/config.js. Edit it here and restart the frontend
  # Deployment to change it without rebuilding/redeploying the image:
  #   oc set data configmap/aifas-config ORCHESTRATOR_API_URL=<new-url> -n 1dca6b-test
  #   oc rollout restart deploy/aifas-frontend -n 1dca6b-test
  ORCHESTRATOR_API_URL: "https://aifas-frontend-1dca6b-test.apps.silver.devops.gov.bc.ca"
